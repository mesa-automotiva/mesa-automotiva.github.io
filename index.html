<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulador de Mesa Automotiva</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #23272d, #070809 62%); color: #f4f4f4; font-family: Arial, sans-serif; }
    main { width: min(820px, calc(100% - 40px)); padding: 42px; border: 1px solid rgba(255,255,255,.12); border-radius: 24px; background: linear-gradient(145deg, rgba(25,28,32,.96), rgba(8,10,12,.96)); box-shadow: 0 22px 80px rgba(0,0,0,.55); }
    .brand { color: #e43932; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin: 10px 0 12px; font-size: clamp(34px, 6vw, 64px); line-height: .98; }
    p { color: #d6dde5; font-size: 18px; line-height: 1.55; max-width: 680px; }
    a { color: #54d7ff; }
    .panel { margin-top: 26px; padding: 18px 20px; border-radius: 16px; background: rgba(255,255,255,.06); }
  </style>
</head>
<body>
  <main>
    <div class="brand">CLOF22 Apps</div>
    <h1>Simulador de Mesa Automotiva</h1>
    <p>Site oficial do desenvolvedor para o app Simulador de Mesa Automotiva.</p>
    <div class="panel">
      <p>Arquivo de autorizacao de anuncios: <a href="/app-ads.txt">app-ads.txt</a></p>
    </div>
  </main>
</body>
</html>
